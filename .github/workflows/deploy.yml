name: Validate site

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guru-holdings-nextjs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: guru-holdings-nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check translations
        run: npm run i18n:check

      - name: Check types
        run: npm run typecheck

      - name: Build production site
        run: npm run build

      - name: Check multilingual SEO
        run: npm run seo:check
